<!DOCTYPE html>
<html>
<head>
  <title>Media Uploader</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(120deg, #f4f6fb 60%, #e0e7ff 100%);
      padding: 20px;
      min-height: 100vh;
    }
    h2 {
      color: #3a3a6a;
      text-align: center;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }
    form {
      display: flex;
      gap: 10px;
      justify-content: center;
      align-items: center;
      background: #fff;
      padding: 18px 20px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(60,60,120,0.08);
      margin-bottom: 18px;
    }
    input[type="file"] {
      border: none;
      background: #f0f2fa;
      padding: 6px 0;
      border-radius: 6px;
    }
    input[type="text"] {
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 1em;
      background: #f9fafb;
      transition: border 0.2s;
    }
    input[type="text"]:focus {
      border: 1.5px solid #6366f1;
      outline: none;
    }
    button {
      background: linear-gradient(90deg, #6366f1 60%, #818cf8 100%);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 18px;
      font-size: 1em;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(99,102,241,0.08);
      transition: background 0.2s, transform 0.1s;
    }
    button:hover {
      background: linear-gradient(90deg, #4f46e5 60%, #6366f1 100%);
      transform: translateY(-2px) scale(1.03);
    }
    #progress-container {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
    }
    #progress-bar {
      height: 18px;
      border-radius: 8px;
      background: #e0e7ff;
      accent-color: #6366f1;
      box-shadow: 0 1px 4px rgba(99,102,241,0.08);
    }
    #progress-text {
      font-weight: 500;
      color: #6366f1;
      min-width: 36px;
      text-align: right;
    }
    .card {
      background: #fff;
      padding: 16px 18px;
      margin: 16px auto;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(60,60,120,0.10);
      max-width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    img, video {
      max-width: 220px;
      border-radius: 10px;
      box-shadow: 0 1px 6px rgba(60,60,120,0.10);
      background: #f4f6fb;
    }
    .card p {
      margin: 0;
      font-size: 1.05em;
      color: #3a3a6a;
      font-weight: 500;
      text-align: center;
    }
    @media (max-width: 600px) {
      form, .card {
        flex-direction: column;
        max-width: 98vw;
        padding: 12px 4vw;
      }
      img, video {
        max-width: 90vw;
      }
    }
  </style>
</head>
<body>
  <h2>Image + Video Uploader</h2>


  <form id="form">
    <input type="file" id="file" accept="image/*,video/*" required>
    <input type="text" id="title" placeholder="Title" required>
    <button>Upload</button>
  </form>
  <div id="progress-container" style="display:none;margin:10px 0;">
    <progress id="progress-bar" value="0" max="100" style="width:200px;"></progress>
    <span id="progress-text">0%</span>
  </div>

  <button onclick="loadMedia()">Show All Media</button>
  <div id="list"></div>

<script src="main.js"></script>
</body>
</html>
